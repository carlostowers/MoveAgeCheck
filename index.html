<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<title>MOVE Verifica tu Categor&iacute;a</title>
<meta name="description" content="Encuentra la categor&iacute;a de tu jugador en segundos. Corte de edad del ciclo con fecha l&iacute;mite 1 de julio de 2027.">
<meta property="og:type" content="website">
<meta property="og:title" content="MOVE Verifica tu Categor&iacute;a">
<meta property="og:description" content="Encuentra la categor&iacute;a de tu jugador en segundos. Selecciona a&ntilde;o y mes de nacimiento y listo.">
<meta property="og:image" content="https://categoria.thegriit.com/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://categoria.thegriit.com/">
<meta name="twitter:card" content="summary_large_image">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Categor&iacute;a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<style>
  :root {
    --black: #000000;
    --white: #FFFFFF;
    --gray-1: #1A1A1A;
    --gray-2: #2E2E2E;
    --gray-3: #8A8A8A;
    --gray-4: #B0B0B0;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--black);
    color: var(--white);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    min-height: 100vh;
  }
  .wrap {
    max-width: 440px;
    margin: 0 auto;
    padding: calc(28px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right)) calc(48px + env(safe-area-inset-bottom)) calc(20px + env(safe-area-inset-left));
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 8px;
  }
  header img {
    width: 120px;
    height: auto;
    display: block;
    margin: 0 auto 10px;
  }
  .app-name {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin: 0 0 2px;
    padding-left: 0.3em;
    color: var(--gray-4);
  }
  .app-name-main {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin: 0;
    padding-left: 0.18em;
  }
  .season {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gray-4);
    margin: 8px 0 0;
    padding-left: 0.22em;
  }
  .diag-rule {
    height: 3px;
    width: 72px;
    background: var(--white);
    margin: 16px auto 0;
    transform: skewX(-24deg);
  }

  /* Steps */
  .step {
    margin-top: 28px;
    animation: rise 0.28s ease both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .step-label {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gray-4);
    margin: 0 0 14px;
    text-align: center;
  }
  .grid {
    display: grid;
    gap: 10px;
  }
  .grid-years { grid-template-columns: 1fr 1fr; }
  .grid-months { grid-template-columns: 1fr 1fr 1fr; }
  .btn {
    background: var(--gray-1);
    border: 1px solid var(--gray-2);
    color: var(--white);
    font-family: inherit;
    font-size: 22px;
    font-weight: 800;
    padding: 16px 8px;
    border-radius: 6px;
    cursor: pointer;
    min-height: 56px;
    transition: background 0.12s ease, transform 0.06s ease;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  .btn:active {
    background: var(--white);
    color: var(--black);
    transform: scale(0.97);
  }
  .btn:focus-visible {
    outline: 2px solid var(--white);
    outline-offset: 2px;
  }
  .btn-wide { grid-column: 1 / -1; font-size: 16px; font-weight: 700; color: var(--gray-4); }
  .btn-month { font-size: 16px; }

  /* Breadcrumb of selection */
  .picked {
    text-align: center;
    margin: 0 0 4px;
    font-size: 15px;
    color: var(--gray-4);
  }
  .picked button {
    background: none;
    border: none;
    color: var(--white);
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    text-decoration: underline;
    cursor: pointer;
    padding: 4px;
  }

  /* Result */
  .result {
    text-align: center;
    margin-top: 20px;
    animation: rise 0.28s ease both;
  }
  .result-division {
    font-size: 128px;
    font-weight: 800;
    line-height: 1;
    margin: 8px 0 4px;
    letter-spacing: -0.02em;
  }
  .result-caption {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray-4);
    margin: 0;
  }
  .result-birth {
    font-size: 15px;
    color: var(--gray-3);
    margin: 14px 0 0;
  }
  .result-note {
    font-size: 17px;
    line-height: 1.5;
    color: var(--white);
    margin: 12px auto 0;
    max-width: 320px;
  }
  .diag-block {
    display: inline-block;
    width: 14px;
    height: 44px;
    background: var(--white);
    transform: skewX(-24deg);
    margin: 0 4px;
  }
  .diag-row { margin-bottom: 6px; }

  .btn-restart {
    margin-top: 32px;
    background: var(--white);
    color: var(--black);
    border: none;
    font-family: inherit;
    font-size: 17px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 16px 36px;
    border-radius: 6px;
    cursor: pointer;
    min-height: 56px;
  }
  .btn-restart:active { transform: scale(0.97); }
  .btn-restart:focus-visible { outline: 2px solid var(--gray-4); outline-offset: 2px; }

  /* Manual date fallback */
  .manual {
    margin-top: 34px;
    text-align: center;
  }
  .manual-toggle {
    background: none;
    border: none;
    color: var(--gray-3);
    font-family: inherit;
    font-size: 13px;
    text-decoration: underline;
    cursor: pointer;
    padding: 8px;
  }
  .manual-field {
    display: none;
    margin-top: 10px;
  }
  .manual-field.open { display: block; }
  input[type="date"] {
    width: 100%;
    max-width: 280px;
    background: var(--gray-1);
    border: 1px solid var(--gray-2);
    color: var(--white);
    font-family: inherit;
    font-size: 18px;
    padding: 13px 14px;
    border-radius: 6px;
    appearance: none;
    -webkit-appearance: none;
    color-scheme: dark;
  }
  input[type="date"]:focus-visible {
    outline: 2px solid var(--white);
    outline-offset: 1px;
  }

  footer {
    margin-top: auto;
    padding-top: 44px;
    font-size: 11px;
    line-height: 1.6;
    color: var(--gray-3);
    text-align: center;
    letter-spacing: 0.03em;
  }

  @media (prefers-reduced-motion: reduce) {
    .step, .result { animation: none; }
  }
  @media (max-width: 360px) {
    .result-division { font-size: 100px; }
    .btn { font-size: 19px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img src="logo.png" width="120" height="87" alt="M.O.V.E.">
    <p class="app-name">Verifica tu</p>
    <h1 class="app-name-main">Categor&iacute;a</h1>
    <p class="season">Temporada 2026&ndash;2027</p>
    <div class="diag-rule"></div>
  </header>

  <div id="app"></div>

  <div class="manual">
    <button type="button" class="manual-toggle" id="manualToggle">Prefiero escribir la fecha</button>
    <div class="manual-field" id="manualField">
      <input type="date" id="manualDate" aria-label="Fecha de nacimiento">
    </div>
  </div>

  <footer>
    Corte de edad basado en reglamento vigente para el ciclo con fecha l&iacute;mite 1 de julio de 2027. Verificar cada temporada.
  </footer>
</div>

<script>
(function () {
  "use strict";

  /* ============================================================
     CONFIGURACION DEL CICLO - actualizar aqui cada temporada.
     La categoria se determina por el "anio de voleibol":
     nacidos jul-dic cuentan con su anio natural; nacidos ene-jun
     cuentan con el anio anterior. Como el corte es el dia 1 del
     mes, el dia de nacimiento nunca altera el resultado; por eso
     el flujo solo pide anio y mes.
     ============================================================ */
  var CYCLE_LABEL = "1 de julio de 2027";
  var DIVISIONS = {
    2020: "6U",
    2019: "7U",
    2018: "8U",
    2017: "9U",
    2016: "10U",
    2015: "11U",
    2014: "12U",
    2013: "13U",
    2012: "14U",
    2011: "15U",
    2010: "16U",
    2009: "17U",
    2008: "18U"
  };
  var YOUNGEST_YEAR = 2020; /* vbYear >= este valor -> division mas joven */
  var OLDEST_YEAR = 2008;   /* vbYear <  este valor -> excede categorias  */
  var YOUNGEST_DIVISION = "6U";

  var MONTHS = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
  var MONTHS_FULL = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];

  var app = document.getElementById("app");
  var state = { year: null };

  function vbYear(year, monthIndex) {
    /* monthIndex 0-11; ene-jun cuentan como el anio anterior */
    return monthIndex <= 5 ? year - 1 : year;
  }

  function divisionFor(vy) {
    try {
      if (vy >= YOUNGEST_YEAR) return YOUNGEST_DIVISION;
      if (vy < OLDEST_YEAR) return null;
      return DIVISIONS[vy] || null;
    } catch (e) {
      return null;
    }
  }

  function clear(node) {
    while (node.firstChild) node.removeChild(node.firstChild);
  }

  function el(tag, className, text) {
    var n = document.createElement(tag);
    if (className) n.className = className;
    if (text) n.textContent = text;
    return n;
  }

  function haptic() {
    try {
      if (navigator && typeof navigator.vibrate === "function") {
        navigator.vibrate(10);
      }
    } catch (e) {
      /* sin soporte: ignorar */
    }
  }

  /* ---------- Paso 1: anio ---------- */
  function renderYearStep() {
    state.year = null;
    clear(app);
    var step = el("div", "step");
    step.appendChild(el("p", "step-label", "A\u00f1o de nacimiento del jugador"));

    var grid = el("div", "grid grid-years");

    for (var y = 2008; y <= 2021; y++) {
      (function (year) {
        var b = el("button", "btn", String(year));
        b.type = "button";
        b.setAttribute("aria-label", "A\u00f1o de nacimiento " + year);
        b.addEventListener("click", function () { haptic(); onYearPick(year); });
        grid.appendChild(b);
      })(y);
    }

    step.appendChild(grid);
    app.appendChild(step);
  }

  function onYearPick(year) {
    /* 2021+: cualquier mes cae en o despues del corte mas joven -> resultado directo */
    if (year >= 2021) {
      renderResult(year, null, null);
      return;
    }
    state.year = year;
    renderMonthStep(year);
  }

  /* ---------- Paso 2: mes ---------- */
  function renderMonthStep(year) {
    clear(app);
    var step = el("div", "step");

    var picked = el("p", "picked");
    picked.appendChild(document.createTextNode("Nacido en " + year + " \u00b7 "));
    var change = el("button", null, "cambiar");
    change.type = "button";
    change.addEventListener("click", renderYearStep);
    picked.appendChild(change);
    step.appendChild(picked);

    step.appendChild(el("p", "step-label", "Mes de nacimiento"));

    var grid = el("div", "grid grid-months");
    for (var m = 0; m < 12; m++) {
      (function (mi) {
        var b = el("button", "btn btn-month", MONTHS[mi]);
        b.type = "button";
        b.setAttribute("aria-label", "Mes de nacimiento " + MONTHS_FULL[mi]);
        b.addEventListener("click", function () { haptic(); renderResult(year, mi, null); });
        grid.appendChild(b);
      })(m);
    }
    step.appendChild(grid);
    app.appendChild(step);
  }

  /* ---------- Resultado ---------- */
  function renderResult(year, monthIndex, special) {
    clear(app);
    var box = el("div", "result");

    var diagRow = el("div", "diag-row");
    diagRow.appendChild(el("span", "diag-block"));
    diagRow.appendChild(el("span", "diag-block"));
    box.appendChild(diagRow);

    var division = null;
    var birthText = "";

    if (special === "older") {
      birthText = "Nacido en 2007 o antes";
    } else if (year !== null && monthIndex === null) {
      division = YOUNGEST_DIVISION;
      birthText = "Nacido en " + year;
    } else {
      var vy = vbYear(year, monthIndex);
      division = divisionFor(vy);
      birthText = "Nacido en " + MONTHS_FULL[monthIndex] + " de " + year;
    }

    if (division) {
      box.appendChild(el("p", "result-division", division));
      box.appendChild(el("p", "result-caption", "Su categor\u00eda"));
      box.appendChild(el("p", "result-birth", birthText));
    } else {
      box.appendChild(el("p", "result-division", "\u2014"));
      box.appendChild(el("p", "result-caption", "Fuera de rango"));
      box.appendChild(el("p", "result-birth", birthText));
      box.appendChild(el("p", "result-note", "Este jugador excede las categor\u00edas juveniles (6U\u201318U) del ciclo con fecha l\u00edmite " + CYCLE_LABEL + "."));
    }

    var restart = el("button", "btn-restart", "Otro jugador");
    restart.type = "button";
    restart.addEventListener("click", function () {
      haptic();
      renderYearStep();
      window.scrollTo(0, 0);
    });
    box.appendChild(restart);

    app.appendChild(box);
  }

  /* ---------- Entrada manual ---------- */
  var manualToggle = document.getElementById("manualToggle");
  var manualField = document.getElementById("manualField");
  var manualDate = document.getElementById("manualDate");

  manualToggle.addEventListener("click", function () {
    manualField.classList.toggle("open");
    if (manualField.classList.contains("open")) manualDate.focus();
  });

  manualDate.addEventListener("change", function () {
    try {
      var v = manualDate.value;
      if (!v) return;
      var parts = v.split("-");
      var y = parseInt(parts[0], 10);
      var m = parseInt(parts[1], 10) - 1;
      if (isNaN(y) || isNaN(m)) return;
      var vy = vbYear(y, m);
      if (vy < OLDEST_YEAR) {
        renderResult(null, null, "older");
      } else {
        renderResult(y, m, null);
      }
      window.scrollTo(0, 0);
    } catch (e) {
      /* entrada invalida: no hacer nada */
    }
  });

  renderYearStep();

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(function () {});
  }
})();
</script>
</body>
</html>
